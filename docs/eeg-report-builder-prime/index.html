<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><title>EEG Report Builder Prime</title>
<style>body{margin:0;padding:1.2rem;font-family:system-ui;background:#f3f5f7;max-width:1200px;margin-inline:auto}h1{margin:0 0 .2rem}.subtitle{color:#5b6573}.layout{display:grid;grid-template-columns:1.1fr 1.2fr;gap:1rem}fieldset{border:1px solid #d7dde5;border-radius:10px;background:#fff;padding:.85rem 1rem;margin:0 0 .8rem}legend{font-weight:650}.inline{display:flex;flex-wrap:wrap;gap:.8rem}.inline label{display:inline-flex;align-items:center;gap:.35rem}.small{font-size:.82rem;color:#5b6573}label{display:block;font-size:.9rem;margin-bottom:.35rem}input[type=text],select,textarea{width:100%;box-sizing:border-box;border:1px solid #c9d0da;border-radius:7px;padding:.4rem .5rem;font-size:.9rem;margin:.15rem 0 .3rem;font-family:inherit}textarea{resize:vertical;min-height:64px}.row-2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}.defaults{display:grid;grid-template-columns:auto 1fr;gap:.45rem}.hidden{display:none}button{border:none;border-radius:999px;padding:.4rem .9rem;background:#1f6feb;color:#fff}.secondary{background:#45556c}.output-area{width:100%;min-height:540px;resize:vertical;border:1px solid #b5c2a8;border-radius:9px;padding:.75rem;background:#f3f6e8;font-family:monospace;white-space:pre-wrap}.output-header{display:flex;justify-content:space-between;align-items:center}#copy-status{font-size:.8rem;color:#5b6573;min-height:1em}@media(max-width:940px){.layout,.row-2{grid-template-columns:1fr}.output-area{min-height:420px}}</style></head>
<body><h1>EEG Report Builder Prime</h1><p class="subtitle">Optimized for fast clinical drafting. Defaults are optional; technical paragraphs unchanged.</p>
<div class="layout"><div>
<fieldset><legend>Study Type</legend><div class="inline"><label><input type="radio" name="studyType" value="spot" checked/> Spot EEG</label><label><input type="radio" name="studyType" value="prolonged"/> Prolonged EEG</label><label><input type="radio" name="studyType" value="ceribell"/> Ceribell</label></div></fieldset>
<fieldset><legend>Sections to Include</legend><label><input type="checkbox" id="includeProcedure" checked/> Procedure / Context</label><label><input type="checkbox" id="includeFindings" checked/> Findings</label><label><input type="checkbox" id="includeImpression" checked/> Impression</label><label><input type="checkbox" id="includeInterim"/> Interim Update (study in progress)</label></fieldset>
<fieldset><legend>Timing</legend><div class="row-2"><label>Start (M/D @hhmm)<input type="text" id="timeStart" placeholder="5/11 @0915"/></label><label>Stop / Reviewed Through (M/D @hhmm)<input type="text" id="timeStop" placeholder="5/11 @1734"/></label></div><label>Short-study duration (Spot EEG)<input type="text" id="shortDuration" placeholder="30 minutes"/></label><div class="defaults"><input type="checkbox" id="useDurationCalc" checked/><label for="useDurationCalc">Auto-calculate duration from start/stop when possible.</label></div></fieldset>
<fieldset><legend>Common Inputs</legend><label>Pertinent History<textarea id="history" placeholder="[]"></textarea></label><div class="defaults"><input type="checkbox" id="historyDefault" checked/><label for="historyDefault">Use default history placeholder if empty.</label></div><label>AEDs/ASMs during study<input type="text" id="aeds" placeholder="levetiracetam, propofol"/></label><div class="defaults"><input type="checkbox" id="aedsDefault" checked/><label for="aedsDefault">Use [none] if blank.</label></div></fieldset>
<fieldset><legend>Findings</legend><label>Background<textarea id="background"></textarea></label><label>Slowing<input type="text" id="slowing"/></label><label>Interictal epileptiform activity<input type="text" id="interictal"/></label><label>Ictal activity<input type="text" id="ictal"/></label><label>Other findings / artifacts<textarea id="otherFindings"></textarea></label></fieldset>
<fieldset><legend>Impression</legend><label>Summary phrase<textarea id="impressionMain"></textarea></label><label>Interpretation comment<textarea id="impressionComment"></textarea></label><label>Ceribell disclaimer (optional override)<textarea id="ceribellDisclaimer">Of note, this study was performed using a rapid EEG system with a limited circumferential montage as detailed above. Depending on persistent clinical concerns for seizures, a standard or prolonged video-EEG study may be warranted.</textarea></label></fieldset>
<fieldset id="interimBox" class="hidden"><legend>Interim Update</legend><p class="small">Fixed study-in-progress callout is included automatically.</p><label>Brief background update<input type="text" id="interimBackground"/></label><label>Brief interictal update<input type="text" id="interimInterictal"/></label><label>Brief ictal/NCSE update<input type="text" id="interimIctal"/></label></fieldset>
</div><div><div class="output-header"><strong>Generated Report</strong><div><button id="generateBtn" type="button">Generate</button> <button id="copyBtn" class="secondary" type="button">Copy</button></div></div><textarea id="output" class="output-area"></textarea><p id="copy-status"></p></div></div>
<script>
const v=id=>document.getElementById(id).value.trim(),checked=id=>document.getElementById(id).checked,studyType=()=>document.querySelector('input[name="studyType"]:checked').value,wd=(x,d)=>x?x:d,join=a=>a.filter(Boolean).map(x=>x.trim()).filter(Boolean).join("\n\n");
function parse(t){const m=t.match(/^\s*(\d{1,2})\/(\d{1,2})\s*@\s*(\d{2})(\d{2})\s*$/);if(!m)return null;const mo=+m[1],d=+m[2],hh=+m[3],mm=+m[4];if(mo<1||mo>12||d<1||d>31||hh>23||mm>59)return null;return{total:((mo*31+d)*24*60)+(hh*60+mm)}}
function duration(s,e){const a=parse(s),b=parse(e);if(!a||!b)return"";let m=b.total-a.total;if(m<0)return"";return`Duration: ${Math.floor(m/60)} hours and ${m%60} minutes`}
function buildProcedure(t){const h=checked("historyDefault")?wd(v("history"),"[]"):v("history"),a=checked("aedsDefault")?wd(v("aeds"),"[none]"):v("aeds"),start=v("timeStart"),stop=v("timeStop"),short=v("shortDuration"),d=checked("useDurationCalc")?duration(start,stop):"";if(t==="spot"||t==="prolonged"){return join(["Video-EEG Study Report\n-----------------------",t==="spot"?"Study Duration:\n"+wd(short,"[none]"):"Study Start:\n"+wd(start,"[none]"),t==="spot"?"":"Study Stop / Reviewed Through:\n"+wd(stop,"[none]"),d,"Pertinent History:\nAs per documentation, the patient is a "+h+".","AED/ASMs during study:\n"+a,"Technical Aspects: This video-EEG study was done with scalp electrodes positioned according to the 10–20 International system of electrode placement. Video-EEG data were recorded continuously and digitally stored."])}
return join(["Ceribell Rapid EEG Study Report\n----------------------------------------","Time Parameters:\nStart "+wd(start,"[none]")+"; reviewed through "+wd(stop,"[none]")+".",d,"Pertinent History:\nAs per documentation, the patient is a "+h+".","AEDs/ASMs during study:\n"+a,"Technical Aspects: This rapid EEG study was performed using a 10-lead, 8-channel system (Ceribell) positioned circumferentially and recorded in a bipolar montage, with EEG channels corresponding approximately to the Fp1–F7, F7–T3, T3–T5, and T5–O1 sites on the left and the Fp2–F8, F8–T4, T4–T6, and T6–O2 sites on the right according to the International 10–20 System. There was no coverage of parasagittal electrode sites. Data were acquired digitally at a sampling rate of 250 Hz with a frequency response of 0.5–100 Hz. The entirety of the study was reviewed. In addition, findings and events identified by a proprietary decision support algorithm (ClarityPro) were reviewed."])}
function buildFindings(t){return join([(t==="ceribell"?"Ceribell Findings":"EEG Findings")+"\n-----------------------","BACKGROUND:\n"+wd(v("background"),"[none]"),"Slowing:\n"+wd(v("slowing"),"[none]"),"EPILEPTIFORM ACTIVITY\nInterictal epileptiform activity:\n"+wd(v("interictal"),"[none]")+"\nIctal activity:\n"+wd(v("ictal"),"[none]"),"OTHER FINDINGS\nOther findings / artifacts:\n"+wd(v("otherFindings"),"[none]")])}
function buildImpression(t){let main=v("impressionMain"),comment=v("impressionComment");if(!comment)comment="These findings are consistent with [].";else if(!/^These findings are consistent with/i.test(comment))comment="These findings are consistent with "+comment;if(!main)main=t==="ceribell"?"This Ceribell study was notable for diffuse theta-delta slowing, lacking evidence of wakefulness.\nThe study was negative for NCSE, seizures, RPPs, or overt epileptiform activity.":"This EEG study was essentially within normal limits in the captured states; no seizures nor epileptiform activity were seen.";return join([(t==="ceribell"?"Ceribell Impression":"EEG Impression")+"\n-----------------------",main,"Interpretation comment:\n"+comment,t==="ceribell"?"Note: "+wd(v("ceribellDisclaimer"),"[none]"):""])}
function buildInterim(t){if(t==="spot")return"";const r=wd(v("timeStop"),"[time]");return join(["INTERIM UPDATE\n-----------------------","STUDY IN PROGRESS — PRELIMINARY INTERPRETATION THROUGH "+r.toUpperCase()+".","BACKGROUND: "+wd(v("interimBackground"),"[background update]"),"INTERICTAL: "+wd(v("interimInterictal"),"[interictal update]"),"ICTAL / NCSE: "+wd(v("interimIctal"),"[ictal/NCSE update]")])}
function buildOutput(){const t=studyType(),b=[];if(checked("includeProcedure"))b.push(buildProcedure(t));if(checked("includeFindings"))b.push(buildFindings(t));if(checked("includeImpression"))b.push(buildImpression(t));if(checked("includeInterim"))b.push(buildInterim(t));document.getElementById("output").value=join(b)}
function sync(){const t=studyType(),show=t==="prolonged"||t==="ceribell";document.getElementById("interimBox").classList.toggle("hidden",!show);if(!show)document.getElementById("includeInterim").checked=false}
async function copyOutput(){const s=document.getElementById("copy-status"),text=document.getElementById("output").value;if(!text.trim()){s.textContent="Nothing to copy yet.";return}try{await navigator.clipboard.writeText(text);s.textContent="Copied."}catch{s.textContent="Copy failed."}setTimeout(()=>s.textContent="",2000)}
document.addEventListener("DOMContentLoaded",()=>{document.querySelectorAll('input[name="studyType"]').forEach(e=>e.addEventListener("change",()=>{sync();buildOutput()}));document.querySelectorAll('input,textarea,select').forEach(e=>e.addEventListener("change",buildOutput));document.getElementById("generateBtn").addEventListener("click",buildOutput);document.getElementById("copyBtn").addEventListener("click",copyOutput);document.getElementById("history").value="[]";sync();buildOutput();});
</script></body></html>
